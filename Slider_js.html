<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript File Loading</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ビデオタグへの指定 */
        .slider-inner li video {
            width: 640px;
            /* 横幅を640pxに固定 */
            height: auto;
            /* 高さは比率を維持して自動調整 */
            display: block;
            /* 下部の余計な隙間を消す */
        }

    </style>
</head>

<body>
    <div class="slider">
        <ul class="slider-inner">
            <!-- ここにlistを作成・追加 -->
        </ul>
        <ul class="nav">
            <!-- ここにlistを作成・追加 -->
        </ul>
        <p id="arrow-prev" class="arrow">←</p>
        <p id="arrow-next" class="arrow">→</p>
    </div>
    <script>
        const sliderInner = document.querySelector(".slider-inner");
        const navContainer = document.querySelector(".nav");
        // スライダーに表示する画像のパス
        // type:属性判別　src:画像・動画素材パス
        const imgList = [
            { type: "img", src: "img/01.jpg", h3: "見出し01", p: "テキストテキストテキスト" },
            { type: "img", src: "img/02.jpg", h3: "見出し02", p: "テキストテキストテキスト" },
            { type: "img", src: "img/03.jpg", h3: "見出し03", p: "テキストテキストテキスト" },
            { type: "img", src: "img/04.jpg", h3: "見出し04", p: "テキストテキストテキスト" },
            { type: "img", src: "img/05.jpg", h3: "見出し05", p: "テキストテキストテキスト" },
            { type: "img", src: "img/06.jpg", h3: "見出し06", p: "テキストテキストテキスト" },
            { type: "video", src: "movie/01.mp4" },
        ];
        imgList.forEach((item, i) => {
            // 画像・動画用リスト
            const slide = document.createElement("li");
            const captionBlock = document.createElement("span");
            // 画像と動画で格納リストコンテナ分岐
            if (item.type === "video") {
                slide.innerHTML = `<video src=${item.src}></video>`;
            } else {
                slide.innerHTML = `<img src=${item.src}><span><h3>${item.h3}</h3><p>${item.p}</p></span>`;
            };
            sliderInner.appendChild(slide);
            const nav = document.createElement("li");
            nav.setAttribute("data-nav-index", i);
            navContainer.appendChild(nav);
        });

        let length = imgList.length - 1;
        let nowIndex = 0;

        const imgSlider = sliderInner.querySelectorAll("li");
        const dotNavigation = navContainer.querySelectorAll("li");

        let isChanging = false;
        let sliderTimer;
        let sliderInterval;

        imgSlider[nowIndex].classList.add("show");
        dotNavigation[nowIndex].classList.add("current");

        // ⬛︎ 画像用の自動スライダー
        function autoSlide() {
            clearInterval(sliderInterval);
            sliderInterval = setInterval(() => {
                let index = (nowIndex + 1) % imgList.length;
                sliderSlide(index);
            }, 30000)
        };

        autoSlide();

        // ⬛︎ sliderSlide()関数内部の流れ
        // if(video要素あり)　→　startVideoSlide()　→　else(若しくは)　→　if(画像あり) →　autoSlide()
        function sliderSlide(val) {
            if (isChanging === true) return;
            isChanging = true;
            // startVideoSlide()/autoSlide()内部でsliderSlide()呼び出し処理実行
            // ⬛︎ 動画リセット
            // 現在のスライドcurrentMovieが動画であればリセット
            const currentMovie = imgSlider[nowIndex].querySelector("video");
            // if(要素名)で要素が存在すれば
            if (currentMovie) {
                //動画一時停止
                currentMovie.pause();
                //動画の再生位置を先頭にリセット
                currentMovie.currentTime = 0;
            };
            // ⬛︎ nowIndexの値を入れ替える
            imgSlider[nowIndex].classList.remove("show");
            dotNavigation[nowIndex].classList.remove("current");
            nowIndex = val;
            imgSlider[nowIndex].classList.add("show");
            dotNavigation[nowIndex].classList.add("current");
            // ⬛︎ 次のスライドを設定
            // 現在のスライドのvideoタグ要素を取得("video");
            const nextMovie = imgSlider[nowIndex].querySelector("video");
            //次のスライドが動画か画像かで処理を分岐
            // if(要素名)要素が存在すれば （現在のスライドが動画なら）以下処理実行
            if (nextMovie) {
                // startVideoSlide()関数実行
                startVideoSlide(nextMovie)
                //動画でなければ以下処理実行
            } else {
                autoSlide();
            };

            clearTimeout(sliderTimer);
            sliderTimer = setTimeout(() => {
                isChanging = false;
            }, 600)
        };

        // ⬛︎ 動画専用の再生制御
        function startVideoSlide(val) {
            // 画像スライド用sliderInterval初期化
            clearInterval(sliderInterval);
            // 現在のvideoタグ要素を再生
            val.play();
            // 動画再生終了次第次のスライドに移る .onendedはインベントハンドラ属性
            val.addEventListener('ended', () => {
                // 1回実行したら自動的に再生予約リストから消去される設定
                let index = (nowIndex + 1) % imgList.length;
                sliderSlide(index)
            }, { once: true })
        };

        // 初期実行（1枚目が動画の場合を考慮）

        document.getElementById("arrow-prev").addEventListener('click', () => {
            let index = nowIndex - 1;
            if (index < 0) index = length;
            sliderSlide(index)
        });
        document.getElementById("arrow-next").addEventListener('click', () => {
            let index = nowIndex + 1;
            if (index > length) index = 0;
            sliderSlide(index)
        });
        dotNavigation.forEach((nav) => {
            nav.addEventListener('click', () => {
                let index = Number(nav.getAttribute("data-nav-index"))
                sliderSlide(index)
            })
        })
    </script>
</body>

</html>
